name: "esp-ixwebsocket"
version: "1.0.0"
description: "Professional port of IXWebSocket for ESP-IDF v5.x. Optimized for MbedTLS 3.x and LWIP."
url: "https://github.com/YauheniMarchanka/esp-ixwebsocket"

# Managed dependencies ensure correct include paths for MbedTLS 3.x
dependencies:
  idf: ">=5.0"

targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c2
  - esp32c3
  - esp32c6
  - esp32h2

tags:
  - websocket
  - networking
  - mbedtls
  - cpp
  - http-client
